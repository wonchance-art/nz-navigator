<section>
  <h2>Living costs</h2>
  <p>If your studies are tertiary level, English language or other non-compulsory study, you must have:</p>
  <ul>
    <li>NZD $20,000 for each year, if you are studying for 1 year or more, or</li>
    <li>NZD $1,667 for each month, if your study is shorter than 1 year.</li>
  </ul>
</section>
