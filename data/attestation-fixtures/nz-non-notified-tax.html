<section>
  <h2>Get the right employee tax code</h2>
  <p>If your employee does not give you a completed IR330, you need to deduct PAYE at the non-notified rate of 45% plus ACC earners’ levy. Use ND as the tax code on the Employment Information return and the PAYE calculator.</p>
</section>
