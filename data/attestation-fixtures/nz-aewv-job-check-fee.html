<section>
  <h2>Fees for AEWV employer accreditation applications</h2>
  <p>Standard accreditation — for businesses hiring up to 5 migrants — is NZD $775.</p>
  <h2>Fees for job checks</h2>
  <p>It costs NZD $735 to apply for a job check.</p>
