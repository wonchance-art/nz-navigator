name: Verify factual claims

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run verifier unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

      - name: Verify claim registry and page markers
        run: python3 scripts/verify_claims.py data/claims.json

      - name: Verify calculator regression samples
        run: node scripts/verify_calculators.mjs

      - name: Verify numeric claim coverage
        run: python3 scripts/verify_claim_coverage.py

      - name: Verify diagnosis regression cases
        if: always()
        run: node scripts/verify_diagnosis.mjs

  runtime-parity:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify representative runtime bindings
        run: >-
          python3 scripts/verify_runtime_parity.py
          --bindings tests/fixtures/runtime-bindings.json

      - name: Verify migrated runtime bindings when present
        shell: bash
        run: |
          if [[ -f data/runtime-bindings.json ]]; then
            python3 scripts/verify_runtime_parity.py \
              --bindings data/runtime-bindings.json
          else
            echo "data/runtime-bindings.json not migrated yet; fixture bindings passed."
          fi

  boundary-execution:
    needs: runtime-parity
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify reviewed boundary execution fixture
        run: >-
          node scripts/verify_boundary_execution.mjs
          --bindings data/runtime-bindings.json
          --manifest tests/fixtures/boundary-executions.json

      - name: Verify production boundary execution when present
        shell: bash
        run: |
          if [[ -f data/boundary-executions.json ]]; then
            node scripts/verify_boundary_execution.mjs \
              --bindings data/runtime-bindings.json \
              --manifest data/boundary-executions.json
          else
            echo "data/boundary-executions.json not migrated yet; fixture execution passed."
          fi

  source-attestation-offline:
    needs: boundary-execution
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      TZ: Asia/Seoul

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify source components, CSV cohorts, budgets, PDF bounds, and issue reducer
        run: >-
          python3 -m unittest
          tests.test_verify_source_attestations
          tests.test_render_attestation_issue
          -v

      - name: Verify production source attestations when present
        shell: bash
        run: |
          if [[ -f data/source-attestations.json ]]; then
            python3 scripts/verify_source_attestations.py \
              --attestations data/source-attestations.json \
              --claims data/claims.json \
              --mode offline \
              --today "$(date +%F)"
          else
            echo "data/source-attestations.json not migrated yet; fixture units passed."
          fi

  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify browser gate failure boundaries
        run: node --test tests/test_verify_browser_e2e.mjs

      - name: Run network-free Chrome browser gate
        run: node scripts/verify_browser_e2e.mjs
